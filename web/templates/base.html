<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLM Data Scientist{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app">
    <nav class="sidebar">
        <div class="sidebar-logo">
            <h2>LLM Data Scientist</h2>
        </div>

        <div class="nav">
            <a href="/" class="{% if active == 'home' %}active{% endif %}">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Home
            </a>
            <a href="/analysis" class="{% if active == 'analysis' %}active{% endif %}">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span> Analysis
            </a>
            <a href="/comparison" class="{% if active == 'comparison' %}active{% endif %}">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Comparison
            </a>
            <a href="/models" class="{% if active == 'models' %}active{% endif %}">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span> Models
            </a>
            <a href="/matrix" class="{% if active == 'matrix' %}active{% endif %}">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span> Matrix
            </a>
            <a href="/results" class="{% if active == 'results' %}active{% endif %}">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span> Results
            </a>
        </div>

        <div class="sidebar-controls">
            <h5>Model</h5>
            <div class="ctrl-row">
                <div>
                    <label class="ctrl-label">Provider</label>
                    <select id="provider" class="ctrl-select" onchange="updateModels()">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
                <div>
                    <label class="ctrl-label">Model</label>
                    <select id="model" class="ctrl-select"></select>
                </div>
            </div>
            <label class="ctrl-label">Temp <span id="tv" style="color:var(--text);">0.20</span></label>
            <input type="range" id="temperature" min="0" max="1" step="0.05" value="0.2"
                   oninput="document.getElementById('tv').textContent=parseFloat(this.value).toFixed(2)">

            {% block sidebar %}{% endblock %}
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>

<script>
const MODELS={
    openai:['gpt-4o','gpt-4o-mini','gpt-4-turbo','o3-mini'],
    anthropic:['claude-sonnet-4-20250514','claude-opus-4-20250514','claude-haiku-4-5-20251001']
};
function updateModels(){
    const s=document.getElementById('model');s.innerHTML='';
    MODELS[document.getElementById('provider').value].forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;s.appendChild(o);});
}
function getLLM(){
    return{provider:document.getElementById('provider').value,model:document.getElementById('model').value,temperature:parseFloat(document.getElementById('temperature').value)};
}
updateModels();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
